---
# SPDX-License-Identifier: MIT
# defaults file for unifi
# Reference: https://docs.linuxserver.io/images/docker-unifi-network-application/#setting-up-your-external-database

unifi_puid: 1000
unifi_pgid: 1000
unifi_timezone: America/New_York

unifi_mongo_user: unifi
unifi_mongo_host: unifi-db
unifi_mongo_port: 27017
unifi_mongo_dbname: unifi
unifi_mongo_version: 7.0.26
unifi_mongo_authsource: admin
unifi_mongo_initdb_root_username: root
unifi_mongo_tls: "false"

unifi_mem_limit: 1024
unifi_mem_startup: 1024

# Bind admin ports (8443, 8080) to this address. Default is localhost only.
# Set to the host's homelab IP (e.g. 192.168.1.x) for LAN access without Traefik.
unifi_bind_address: "127.0.0.1"

# Image version to deploy. Pin to a specific release for reproducibility.
unifi_version: "9.0.114"
