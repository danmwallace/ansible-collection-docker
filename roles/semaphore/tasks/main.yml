---
# tasks file for semaphore

- name: Ensure /opt/docker/semaphore directory exists
  ansible.builtin.file:
    path: /opt/docker/semaphore
    state: directory
    mode: '0755'
  become: true

- name: Render semaphore docker-compose.yml from template
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: /opt/docker/semaphore/docker-compose.yml
    mode: '0600'
  become: true
  notify: Restart semaphore compose project

- name: Deploy semaphore via docker compose
  community.docker.docker_compose_v2:
    project_src: /opt/docker/semaphore/
    files:
      - docker-compose.yml
    state: present
  become: true
