---
# tasks file for docker

# --- Ubuntu / Debian ---

- name: Ensure /etc/apt/keyrings exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"
  become: true
  when: ansible_facts['os_family'] == "Debian"

- name: Fetch Docker apt signing key
  ansible.builtin.get_url:
    url: "https://download.docker.com/linux/{{ ansible_facts['distribution'] | lower }}/gpg"
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"
    force: false
  become: true
  when: ansible_facts['os_family'] == "Debian"

- name: Add Docker apt repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch={{ _docker_apt_arch_map[ansible_facts['architecture']] | default(ansible_facts['architecture']) }}
      signed-by=/etc/apt/keyrings/docker.asc]
      https://download.docker.com/linux/{{ ansible_facts['distribution'] | lower }}
      {{ ansible_facts['distribution_release'] }} stable
    state: present
    filename: docker
    update_cache: true
  become: true
  when: ansible_facts['os_family'] == "Debian"

- name: Remove distro-provided Docker packages that conflict with docker-ce
  ansible.builtin.apt:
    name:
      - docker.io
      - docker-compose
      - docker-compose-v2
      - docker-doc
      - podman-docker
    state: absent
  become: true
  when: ansible_facts['os_family'] == "Debian"

- name: Install Docker CE and the compose plugin
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
  become: true
  when: ansible_facts['os_family'] == "Debian"

# --- Fedora ---

- name: Detect Fedora docker_variant_id from /etc/os-release
  ansible.builtin.command:
    cmd: awk -F= '/^VARIANT_ID=/ { gsub(/"/, "", $2); print $2 }' /etc/os-release
  register: docker_variant_id
  changed_when: false
  when: ansible_facts['distribution'] == "Fedora"

- name: Install Docker CE yum repository on Fedora
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/fedora/docker-ce.repo
    dest: /etc/yum.repos.d/docker-ce.repo
    mode: "0644"
  become: true
  when: ansible_facts['distribution'] == "Fedora"

- name: Install Docker via rpm-ostree on Fedora Atomic variants
  community.general.rpm_ostree_pkg:
    name: docker-ce
    state: present
  become: true
  when:
    - ansible_facts['distribution'] == "Fedora"
    - docker_variant_id.stdout in ['iot', 'coreos', 'silverblue', 'kinoite']

- name: Install Docker via dnf on Fedora Server
  ansible.builtin.dnf:
    name: "{{ docker_fedora_packages }}"
    state: present
  become: true
  when:
    - ansible_facts['distribution'] == "Fedora"
    - docker_variant_id.stdout not in ['iot', 'coreos', 'silverblue', 'kinoite']

- name: Enable docker.service on Fedora Server
  ansible.builtin.systemd:
    name: docker.service
    enabled: true
  become: true
  when:
    - ansible_facts['distribution'] == "Fedora"
    - docker_variant_id.stdout not in ['iot', 'coreos', 'silverblue', 'kinoite']

# --- User configuration ---

- name: Ensure docker group exists
  ansible.builtin.group:
    name: docker
    state: present
  become: true

- name: Add ansible user to docker group
  ansible.builtin.user:
    name: ansible
    groups: docker
    append: true
  become: true
