---
- name: Create molecule instance
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Start docker-instance container
      containers.podman.podman_container:
        name: docker-instance
        image: docker.io/jrei/systemd-ubuntu:24.04
        state: started
        command: /sbin/init
        privileged: true
        systemd: always
        volumes:
          - /sys/fs/cgroup:/sys/fs/cgroup:rw
        cgroupns: host

- name: Prepare molecule instance
  hosts: molecule
  gather_facts: true
  tasks:
    - name: Ensure ansible user exists (role's final task adds it to the docker group)
      ansible.builtin.user:
        name: ansible
        state: present
