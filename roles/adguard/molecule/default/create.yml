---
- name: Create molecule instance
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Start adguard-instance container
      containers.podman.podman_container:
        name: adguard-instance
        image: quay.io/ansible/molecule-ubuntu:noble
        state: started
        command: /sbin/init
        privileged: true
        systemd: always
        volumes:
          - /sys/fs/cgroup:/sys/fs/cgroup:rw
        cgroupns: host

- name: Prepare molecule instance
  hosts: molecule
  gather_facts: true
  tasks:
    - name: Ensure docker group exists (role tasks chown data dirs to it)
      ansible.builtin.group:
        name: docker
        state: present

    - name: Ensure ansible user exists (role tasks chown data dirs to it)
      ansible.builtin.user:
        name: ansible
        group: docker
        state: present
