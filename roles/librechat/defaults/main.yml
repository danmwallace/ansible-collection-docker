---
# ######################################################################
# defaults file for librechat
#
# These are fallback values. Real values should be set in the consuming
# inventory (group_vars/librechat/*.yml). Variables are prefixed with
# `librechat_` to avoid collisions with other roles and to keep the
# namespace consistent with the consuming playbook.
#
# NOTE: LibreChat's .env surface changes frequently upstream. This file and
# templates/env.j2 are a snapshot, not a live mirror. Review the official
# reference before changing settings: https://www.librechat.ai/docs/configuration/dotenv
# To add/track options this role doesn't expose, fork the collection and edit
# this file plus templates/env.j2 to match your LibreChat version.
#
# Secrets are expected under the `vault_librechat_` prefix in vault.yml
# and are referenced directly in the templates — they are not
# duplicated here.
#
# Reference: https://www.librechat.ai/docs/configuration/dotenv
# ######################################################################

# ###########################################################################
# Docker images (see docker-services.yml in group_vars)
# ###########################################################################

librechat_api_image: ghcr.io/danny-avila/librechat-api:latest
librechat_meilisearch_image: getmeili/meilisearch:v1.12.3
librechat_vectordb_image: pgvector/pgvector:0.8.0-pg15-trixie
librechat_ragapi_image: ghcr.io/danny-avila/librechat-rag-api-dev-lite:latest

librechat_vectordb_postgres_db: librechat
librechat_vectordb_postgres_user: librechat

############################################################################
# LibreChat repo + paths
############################################################################

# Git ref (tag or branch) to clone LibreChat at. Pin to a release tag for
# reproducibility; "main" tracks upstream HEAD.
librechat_version: main

# Filesystem layout for /opt/docker/librechat. Future work: revisit whether
# /opt/docker is the right home, and whether ansible:docker is the right
# ownership. For now, all bind mounts and volumes live under data_path.
librechat_install_path: /opt/docker/librechat
librechat_data_path: /opt/docker/librechat/data
librechat_owner: ansible
librechat_group: docker

# Optional Obsidian vault bind mount (toggle, mount path is shared between
# docker-compose.yml.j2 and the mcp-obsidian server in librechat.yaml.j2).
librechat_obsidian_mount_enabled: true
librechat_obsidian_mount_path: /opt/syncthing/obsidian

############################################################################
# Azure Configuration
############################################################################

librechat_azure_subscription_id:
librechat_azure_dns_resource_group:
librechat_azure_dns_zone:
librechat_azure_openai_instance:
librechat_azure_tenant_id:
librechat_azure_assistants_enabled: false

############################################################################
# Server Configuration
############################################################################

librechat_hostname:
librechat_port: 3080
librechat_dns_resolver: 1.1.1.1

librechat_no_index: true
librechat_console_json: true
librechat_debug_logging: true
librechat_debug_console: false
librechat_agent_debug_logging: false

# Reverse-proxy hop count. The role runs behind Traefik so the first
# untrusted address is one hop away.
librechat_trust_proxy: 1

# Minimum local password length (set to 1 when delegating to LDAP).
librechat_min_password_length:
# Keep the process alive on uncaught exceptions. Off in production.
librechat_continue_on_uncaught_exception:
librechat_uid: 0
librechat_gid: 0

############################################################################
# Node Options
############################################################################

# Build-arg passed to Docker / CI. Not read by Node.js at runtime.
librechat_node_max_old_space_size: 6144

############################################################################
# MongoDB connection pool
############################################################################

librechat_mongo_max_pool_size:
librechat_mongo_min_pool_size:
librechat_mongo_max_connecting:
librechat_mongo_max_idle_time_ms:
librechat_mongo_wait_queue_timeout_ms:
librechat_mongo_auto_index:
librechat_mongo_auto_create:
# ###########################################################################
# Langfuse Tracing
# ###########################################################################

librechat_langfuse_public_key:
librechat_langfuse_secret_key:
librechat_langfuse_base_url:
# ###########################################################################
# Endpoints
# ###########################################################################

librechat_endpoints: azureOpenAI,anthropic,agents,azureAssistants
librechat_proxy:
# ###########################################################################
# Anthropic
# ###########################################################################

librechat_anthropic_models: claude-opus-4-7,claude-sonnet-4-6,claude-opus-4-6,claude-3-7-sonnet-20250219,claude-3-5-sonnet-20241022,claude-3-5-haiku-20241022
librechat_anthropic_reverse_proxy:
librechat_anthropic_use_vertex:
librechat_anthropic_vertex_region: us-east5

############################################################################
# xAI / Grok
############################################################################

librechat_xai_api_key:
# ###########################################################################
# BingAI
# ###########################################################################

librechat_bingai_token: user_provided
librechat_bingai_host: https://cn.bing.com

