librechat_registration_violation_score: 1
librechat_concurrent_violation_score: 1
librechat_message_violation_score: 1
librechat_non_browser_violation_score: 20
librechat_tts_violation_score: 0
librechat_stt_violation_score: 0
librechat_fork_violation_score: 0
librechat_import_violation_score: 0
librechat_file_upload_violation_score: 0

librechat_login_max: 7
librechat_login_window: 5
librechat_register_max: 5
