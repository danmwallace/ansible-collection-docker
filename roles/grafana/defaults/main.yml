# SPDX-License-Identifier: MIT
# defaults file for grafana

grafana_server_root_url: "https://{{ grafana_hostname }}"
grafana_disable_login_form: "false"
grafana_install_plugins: ""
grafana_cpu_limit: "2"
grafana_memory_limit: "2gb"

# Image version to deploy. Pin to a specific release for reproducibility.
grafana_version: "11.4.0"
