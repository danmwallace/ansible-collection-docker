---
# tasks file for it_tools

- name: Ensure it-tools directory exists
  ansible.builtin.file:
    path: /opt/docker/it-tools
    state: directory
    mode: "0755"
  become: true

- name: Render it-tools docker-compose.yml from template
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: /opt/docker/it-tools/docker-compose.yml
    mode: "0600"
  become: true
  notify: Restart it-tools compose project

- name: Deploy it-tools via docker compose
  community.docker.docker_compose_v2:
    project_src: /opt/docker/it-tools/
    state: present
  become: true
  tags: [molecule-notest]
