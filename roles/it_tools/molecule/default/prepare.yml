---
- name: Prepare molecule instance
  hosts: molecule
  gather_facts: false
  tasks:
    - name: Update apt cache
      ansible.builtin.raw: apt-get update -qq
      changed_when: false

    - name: Install Docker, sudo, and Python3
      ansible.builtin.raw: apt-get install -y -qq sudo docker.io docker-compose-v2 python3
      changed_when: false

    - name: Create Docker config directory
      ansible.builtin.file:
        path: /etc/docker
        state: directory
        mode: "0755"

    - name: Configure Docker daemon for container environment
      ansible.builtin.copy:
        content: '{"storage-driver":"vfs","exec-opts":["native.cgroupdriver=cgroupfs"]}'
        dest: /etc/docker/daemon.json
        mode: "0644"

    - name: Start Docker daemon
      ansible.builtin.raw: systemctl start docker
      changed_when: false

    - name: Create proxy_network Docker network
      ansible.builtin.raw: docker network create proxy_network
      failed_when: false
      changed_when: false
