---
# defaults file for common

# Packages installed via apt on Debian/Ubuntu
common_packages_debian:
  - apt-transport-https
  - ca-certificates
  - cockpit
  - curl
  - git
  - gnupg
  - lsb-release
  - python3
  - python3-venv

# Packages installed via dnf (Fedora Server) or rpm-ostree (Fedora Atomic)
common_packages_fedora:
  - ca-certificates
  - certbot
  - curl
  - git
  - gnupg2
  - python3
  - python3-virtualenv

# Timezone applied to the host (community.general.timezone)
common_timezone: "America/New_York"

# Users to create. Each entry is { name: <login>, ssh_key: "<openssh public key>" }
# Override in group_vars/host_vars. Example:
#   common_users:
#     - name: dwallace
#       ssh_key: "ssh-ed25519 AAAA..."
common_users: []
